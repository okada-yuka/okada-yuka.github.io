<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hero Bank - あなたの熱狂を、確かな価値へ。</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-deep-blue: #001D3D; /* 深海のような紺色 */
            --color-royal-blue: #005CBF; /* ブルージェイズ・ブルー */
            --color-card-blue: #002D5F;  /* カード用少し明るい青 */
            --color-accent-red: #E31D2B; /* アクセントレッド */
            --color-text-white: #FFFFFF;
            --color-text-dim: #A3D2FF;   /* 文字用薄い青 */
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--color-deep-blue);
            color: var(--color-text-white);
            overflow-x: hidden;
            line-height: 1.8;
        }

        .font-anton {
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ヒーローセクション（FV） */
        .hero-fullscreen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle at center, #005CBF 0%, #001D3D 100%);
        }

        /* セクション共通背景 */
        .section-dark {
            background-color: var(--color-deep-blue);
        }

        /* アクセント線（赤） */
        .accent-line::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background-color: var(--color-accent-red);
        }

        /* スクロールダウンの矢印 */
        .scroll-down {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);}
            40% {transform: translateY(-10px) translateX(-50%);}
            60% {transform: translateY(-5px) translateX(-50%);}
        }

        /* Glassmorphism カード */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <header class="fixed top-0 left-0 w-full z-50 bg-[#001D3D]/80 backdrop-blur-md">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="#" class="flex items-center space-x-3">
                <span class="text-3xl font-anton tracking-tighter" style="color: white;">My Hero Bank</span>
            </a>
            <div class="flex items-center space-x-8 text-xs font-black tracking-widest">
                <a href="#about" class="hover:text-red-500 transition">ABOUT</a>
                <a href="#rules" class="hover:text-red-500 transition">RULES</a>
                <a href="#download" class="bg-white text-blue-900 px-6 py-2.5 rounded-full hover:bg-red-500 hover:text-white transition duration-300">DOWNLOAD</a>
            </div>
        </nav>
    </header>

    <section id="hero" class="hero-fullscreen relative overflow-hidden">
        <div class="absolute inset-0 z-0 opacity-10 scale-110">
            <img src="bear_hero.png" alt="Background Bear" class="w-full h-full object-cover object-center">
        </div>
        
        <div class="text-center z-10 px-6" data-aos="zoom-out" data-aos-duration="2000">
            <div class="relative inline-block mb-12">
                <div class="absolute -inset-4 bg-white/10 blur-2xl rounded-full"></div>
                <img src="bear_hero.png" alt="My Hero Bank Bear" class="w-64 h-auto relative z-10">
            </div>
            
            <p class="text-xl md:text-2xl font-black mb-4 tracking-[0.3em]" style="color: var(--color-text-dim);">DREAM BIG, SAVE BIG.</p>
            <h1 class="text-6xl md:text-[10rem] font-anton leading-none mb-12 relative">
                MY HERO BANK
            </h1>
            <a href="#about" class="inline-block border-2 border-white text-white font-black px-14 py-4 rounded-full text-xl hover:bg-white hover:text-blue-900 transition duration-500">
                EXPLORE
            </a>
        </div>
        <div class="scroll-down text-white/30 text-2xl font-anton">SCROLL</div>
    </section>

    <section id="about" class="section-dark py-40 px-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-24">
            <div class="md:w-1/2 space-y-12" data-aos="fade-up">
                <h2 class="text-5xl md:text-7xl font-black leading-tight italic">
                    その一振りを、<br><span class="text-red-600">あなたの資産</span>へ。
                </h2>
                <p class="text-xl text-dim leading-loose text-blue-200">
                    応援は、投資だ。<br>
                    My Hero Bankは、プロ野球選手の活躍を<br>
                    リアルタイムであなたの貯金箱に直結させます。<br>
                    推しの勝利と、あなたの夢。その両方を同時に追いかける。
                </p>
            </div>
            <div class="md:w-1/2" data-aos="fade-left">
                <div class="relative">
                    <div class="absolute -inset-4 bg-red-600/20 blur-3xl rounded-full"></div>
                    <div class="relative w-full h-[650px] bg-card-blue glass-card rounded-[3rem] shadow-2xl flex items-center justify-center text-blue-300 font-anton text-4xl overflow-hidden p-4">
                        <img src="app_screen_home.png" alt="My Hero Bank App Home" class="h-full w-auto object-contain rounded-2xl shadow-inner">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="rules" class="py-40 px-6 bg-[#002D5F]">
        <div class="max-w-4xl mx-auto text-center mb-32" data-aos="fade-up">
            <h2 class="text-4xl md:text-6xl font-black mb-8 accent-line relative inline-block">THE RULES</h2>
        </div>
        </section>

    <footer class="bg-black/40 py-24 px-6 border-t border-white/5">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start gap-16">
            <h2 class="text-4xl font-anton">MY HERO BANK</h2>
        </div>
        </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1200,
            once: true,
            easing: 'ease-out-back'
        });
    </script>
</body>
</html>
